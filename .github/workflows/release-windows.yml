# Build EmotivController.exe on a version tag and publish a GitHub Release with:
#   - EmotivController.exe
#   - latest.json  (version, download_url for this tag's EXE, sha256)
#
# In-app updates: bake this URL when building (scripts/build.sh --update-manifest-url):
#   https://github.com/N6-Studio/emotiv-controller/releases/latest/download/latest.json
#
# Trigger: push a tag matching v* (e.g. v1.2.3), or workflow_dispatch with ref set
# to that tag (used by tag-from-version.yml after a GITHUB_TOKEN tag push).
# Runner: windows-latest (required for Windows PE). Shell: bash (Git Bash on the runner).

name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Derive semver from tag
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ -z "$tag" ]]; then echo "Empty GITHUB_REF_NAME"; exit 1; fi
          if [[ "${tag}" =~ ^[vV] ]]; then
            ver="${tag#?}"
          else
            ver="$tag"
          fi
          repo="${GITHUB_REPOSITORY}"
          manifest_url="https://github.com/${repo}/releases/latest/download/latest.json"
          download_url="https://github.com/${repo}/releases/download/${tag}/EmotivController.exe"
          {
            echo "version=${ver}"
            echo "manifest_url=${manifest_url}"
            echo "download_url=${download_url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build PyInstaller EXE (unsigned in CI)
        env:
          APP_VERSION: ${{ steps.meta.outputs.version }}
          MANIFEST_URL: ${{ steps.meta.outputs.manifest_url }}
        run: |
          set -euo pipefail
          bash ./scripts/build.sh --skip-sign \
            --app-version "${APP_VERSION}" \
            --update-manifest-url "${MANIFEST_URL}"

      - name: Write latest.json for this release
        env:
          APP_VERSION: ${{ steps.meta.outputs.version }}
          DOWNLOAD_URL: ${{ steps.meta.outputs.download_url }}
        run: |
          set -euo pipefail
          python -c "
          import hashlib, json, os, pathlib
          exe = pathlib.Path('dist/EmotivController.exe')
          h = hashlib.sha256(exe.read_bytes()).hexdigest().lower()
          obj = {
              'version': os.environ['APP_VERSION'],
              'download_url': os.environ['DOWNLOAD_URL'],
              'sha256': h,
          }
          pathlib.Path('latest.json').write_text(
              json.dumps(obj, separators=(',', ':')),
              encoding='utf-8',
          )
          "

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/EmotivController.exe
            latest.json
